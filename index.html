<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HDB Resale Search</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f4f0;
    --card: #ffffff;
    --border: #e0ddd6;
    --text: #1a1a18;
    --muted: #6b6a65;
    --accent: #D85A30;
    --accent2: #1D9E75;
    --accent3: #378ADD;
    --surface: #f0ede8;
    --shadow: 0 2px 12px rgba(0,0,0,0.07);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    color: var(--text);
    letter-spacing: -0.02em;
  }
  .logo span { color: var(--accent); }
  .header-tag {
    font-size: 11px;
    background: #EAF3DE;
    color: #3B6D11;
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: 500;
  }

  /* ── Main layout ── */
  main {
    max-width: 860px;
    margin: 0 auto;
    padding: 32px 20px 60px;
  }

  .page-title {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 6px;
    line-height: 1.2;
  }
  .page-sub {
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 28px;
  }

  /* ── Search card ── */
  .search-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    box-shadow: var(--shadow);
    margin-bottom: 24px;
  }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 16px;
  }
  .form-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .form-group.full { grid-column: 1 / -1; }

  label {
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.07em;
  }

  input, select {
    height: 42px;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0 14px;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
    width: 100%;
  }
  input:focus, select:focus {
    border-color: var(--accent);
    background: #fff;
  }
  input::placeholder { color: #b0aea8; }

  /* ── Period toggle ── */
  .period-row {
    display: flex;
    gap: 8px;
    margin-bottom: 18px;
  }
  .period-btn {
    flex: 1;
    height: 42px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--bg);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .period-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }
  .period-btn:hover:not(.active) {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* ── Search button ── */
  .search-btn {
    width: 100%;
    height: 48px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
  }
  .search-btn:hover { opacity: 0.9; }
  .search-btn:active { transform: scale(0.99); }
  .search-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ── Results section ── */
  #results-section { display: none; }

  .results-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }
  .results-title {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
  }
  .results-count {
    font-size: 12px;
    color: var(--muted);
    background: var(--surface);
    padding: 4px 12px;
    border-radius: 20px;
  }

  /* ── Summary stats ── */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 20px;
  }
  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    text-align: center;
  }
  .stat-val {
    font-size: 20px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.1;
  }
  .stat-label {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
  }

  /* ── Transactions table ── */
  .table-wrap {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    box-shadow: var(--shadow);
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  thead th {
    background: var(--surface);
    padding: 10px 14px;
    text-align: left;
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    border-bottom: 1px solid var(--border);
  }
  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--bg); }
  tbody td {
    padding: 11px 14px;
    color: var(--text);
  }
  .price-cell {
    font-weight: 600;
    color: var(--accent);
  }
  .month-cell { color: var(--muted); font-size: 12px; }
  .flat-badge {
    display: inline-block;
    background: var(--surface);
    border-radius: 6px;
    padding: 2px 8px;
    font-size: 11px;
    font-weight: 500;
    color: var(--muted);
  }

  /* ── Empty / Loading / Error states ── */
  .state-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 48px 24px;
    text-align: center;
  }
  .state-icon { font-size: 36px; margin-bottom: 12px; }
  .state-title { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
  .state-sub { font-size: 13px; color: var(--muted); }

  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto 14px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── No results tip ── */
  .tip-list {
    text-align: left;
    display: inline-block;
    margin-top: 12px;
    font-size: 13px;
    color: var(--muted);
    line-height: 2;
  }
  .tip-list li { list-style: none; padding-left: 16px; position: relative; }
  .tip-list li::before { content: "→"; position: absolute; left: 0; color: var(--accent); }

  /* ── Footer ── */
  footer {
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    padding: 20px;
    border-top: 1px solid var(--border);
  }
  footer a { color: var(--accent3); text-decoration: none; }

  @media (max-width: 600px) {
    .form-grid { grid-template-columns: 1fr; }
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .page-title { font-size: 22px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">HDB <span>Resale</span> Search</div>
  <div class="header-tag">Live data · data.gov.sg</div>
</header>

<main>
  <div class="page-title">Find resale transactions</div>
  <div class="page-sub">Search past HDB resale transactions by town, street, flat type, storey and unit. Data sourced live from data.gov.sg.</div>

  <!-- Search Card -->
  <div class="search-card">
    <div class="form-grid">
      <!-- Town -->
      <div class="form-group">
        <label>Town</label>
        <select id="inp-town">
          <option value="">All towns</option>
          <option>ANG MO KIO</option>
          <option>BEDOK</option>
          <option>BISHAN</option>
          <option>BUKIT BATOK</option>
          <option>BUKIT MERAH</option>
          <option>BUKIT PANJANG</option>
          <option>BUKIT TIMAH</option>
          <option>CENTRAL AREA</option>
          <option>CHOA CHU KANG</option>
          <option>CLEMENTI</option>
          <option>GEYLANG</option>
          <option>HOUGANG</option>
          <option>JURONG EAST</option>
          <option>JURONG WEST</option>
          <option>KALLANG/WHAMPOA</option>
          <option>MARINE PARADE</option>
          <option>PASIR RIS</option>
          <option>PUNGGOL</option>
          <option>QUEENSTOWN</option>
          <option>SEMBAWANG</option>
          <option>SENGKANG</option>
          <option>SERANGOON</option>
          <option>TAMPINES</option>
          <option>TOA PAYOH</option>
          <option>WOODLANDS</option>
          <option>YISHUN</option>
        </select>
      </div>

      <!-- Flat type -->
      <div class="form-group">
        <label>Flat type</label>
        <select id="inp-flat">
          <option value="">All types</option>
          <option>1 ROOM</option>
          <option>2 ROOM</option>
          <option>3 ROOM</option>
          <option>4 ROOM</option>
          <option>5 ROOM</option>
          <option>EXECUTIVE</option>
          <option>MULTI-GENERATION</option>
        </select>
      </div>

      <!-- Street -->
      <div class="form-group full">
        <label>Street name <span style="font-weight:400;text-transform:none;letter-spacing:0;">(optional — e.g. ANG MO KIO AVE 3)</span></label>
        <input type="text" id="inp-street" placeholder="e.g. TAMPINES ST 21" />
      </div>

      <!-- Block -->
      <div class="form-group">
        <label>Block <span style="font-weight:400;text-transform:none;letter-spacing:0;">(optional)</span></label>
        <input type="text" id="inp-block" placeholder="e.g. 123" />
      </div>

      <!-- Storey range -->
      <div class="form-group">
        <label>Storey range <span style="font-weight:400;text-transform:none;letter-spacing:0;">(optional)</span></label>
        <select id="inp-storey">
          <option value="">Any floor</option>
          <option>01 TO 03</option>
          <option>04 TO 06</option>
          <option>07 TO 09</option>
          <option>10 TO 12</option>
          <option>13 TO 15</option>
          <option>16 TO 18</option>
          <option>19 TO 21</option>
          <option>22 TO 24</option>
          <option>25 TO 27</option>
          <option>28 TO 30</option>
          <option>31 TO 33</option>
          <option>34 TO 36</option>
          <option>37 TO 39</option>
          <option>40 TO 42</option>
          <option>43 TO 45</option>
          <option>46 TO 48</option>
          <option>49 TO 51</option>
        </select>
      </div>
    </div>

    <!-- Period buttons -->
    <div style="margin-bottom:8px;">
      <label>Period</label>
    </div>
    <div class="period-row">
      <button class="period-btn active" data-months="6">Last 6 months</button>
      <button class="period-btn" data-months="12">Last 1 year</button>
      <button class="period-btn" data-months="24">Last 2 years</button>
      <button class="period-btn" data-months="60">Last 5 years</button>
    </div>

    <button class="search-btn" id="search-btn" onclick="doSearch()">Search transactions</button>
  </div>

  <!-- Results -->
  <div id="results-section">
    <div class="results-header">
      <div class="results-title" id="results-title">Results</div>
      <div class="results-count" id="results-count"></div>
    </div>
    <div class="stats-row" id="stats-row"></div>
    <div class="table-wrap" id="table-wrap"></div>
  </div>

  <!-- State boxes -->
  <div id="state-box"></div>

</main>

<footer>
  Data sourced from <a href="https://data.gov.sg" target="_blank">data.gov.sg</a> — HDB Resale Flat Prices (Jan 2017 onwards). Updated monthly.
</footer>

<script>
  const DATASET_ID = 'd_8b84c4ee58e3cfc0ece0d773c8ca6abc';
  const API_BASE   = 'https://data.gov.sg/api/action/datastore_search';

  let selectedMonths = 6;

  // Period button toggle
  document.querySelectorAll('.period-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedMonths = parseInt(btn.dataset.months);
    });
  });

  // Get date range string based on selected months
  function getDateRange(months) {
    const now = new Date();
    const from = new Date(now.getFullYear(), now.getMonth() - months, 1);
    const pad = n => String(n).padStart(2, '0');
    const fromStr = `${from.getFullYear()}-${pad(from.getMonth() + 1)}`;
    const toStr   = `${now.getFullYear()}-${pad(now.getMonth() + 1)}`;
    return { fromStr, toStr };
  }

  // Build API filter string
  function buildFilters() {
    const filters = {};
    const town    = document.getElementById('inp-town').value.trim();
    const flat    = document.getElementById('inp-flat').value.trim();
    const street  = document.getElementById('inp-street').value.trim().toUpperCase();
    const block   = document.getElementById('inp-block').value.trim().toUpperCase();
    const storey  = document.getElementById('inp-storey').value.trim();
    if (town)   filters.town       = town;
    if (flat)   filters.flat_type  = flat;
    if (street) filters.street_name = street;
    if (block)  filters.block      = block;
    if (storey) filters.storey_range = storey;
    return filters;
  }

  // Fetch all pages from API
  async function fetchAll(filters, fromStr, toStr) {
    let allRecords = [];
    let offset = 0;
    const limit = 100;

    while (true) {
      const params = new URLSearchParams({
        resource_id: DATASET_ID,
        limit: limit,
        offset: offset,
        filters: JSON.stringify(filters),
        sort: 'month desc'
      });

      const resp = await fetch(`${API_BASE}?${params}`);
      if (!resp.ok) throw new Error(`API error ${resp.status}`);
      const data = await resp.json();

      if (!data.success) throw new Error('API returned error');

      const records = data.result.records;
      if (!records || records.length === 0) break;

      // Filter by date range client-side (API doesn't support date range filter natively)
      const filtered = records.filter(r => r.month >= fromStr && r.month <= toStr);
      allRecords = allRecords.concat(filtered);

      // If we got fewer than limit, or all remaining are before fromStr, stop
      const lastMonth = records[records.length - 1].month;
      if (records.length < limit || lastMonth < fromStr) break;

      offset += limit;

      // Safety cap — avoid infinite loop
      if (offset > 5000) break;
    }

    return allRecords;
  }

  function formatPrice(p) {
    return '$' + Number(p).toLocaleString();
  }

  function showState(html) {
    document.getElementById('results-section').style.display = 'none';
    document.getElementById('state-box').innerHTML = html;
  }

  function clearState() {
    document.getElementById('state-box').innerHTML = '';
  }

  async function doSearch() {
    const btn = document.getElementById('search-btn');
    btn.disabled = true;
    btn.textContent = 'Searching…';

    showState(`
      <div class="state-box">
        <div class="spinner"></div>
        <div class="state-title">Fetching transactions…</div>
        <div class="state-sub">Calling data.gov.sg API</div>
      </div>
    `);

    try {
      const filters = buildFilters();
      const { fromStr, toStr } = getDateRange(selectedMonths);

      const records = await fetchAll(filters, fromStr, toStr);

      if (records.length === 0) {
        const town = document.getElementById('inp-town').value || 'selected area';
        showState(`
          <div class="state-box">
            <div class="state-icon">🔍</div>
            <div class="state-title">No transactions found</div>
            <div class="state-sub">No resale data for ${town} in the last ${selectedMonths === 6 ? '6 months' : selectedMonths === 12 ? '1 year' : selectedMonths === 24 ? '2 years' : '5 years'}.</div>
            <ul class="tip-list">
              <li>Try a longer time period</li>
              <li>Check the street name spelling (use ALL CAPS)</li>
              <li>Remove block or storey filters</li>
              <li>Try a nearby town</li>
            </ul>
          </div>
        `);
        return;
      }

      // ── Compute summary stats ──
      const prices = records.map(r => Number(r.resale_price));
      const avgPrice = prices.reduce((a, b) => a + b, 0) / prices.length;
      const maxPrice = Math.max(...prices);
      const minPrice = Math.min(...prices);
      const totalTxns = records.length;

      // PSF calc
      const psf = records
        .filter(r => r.floor_area_sqm && Number(r.floor_area_sqm) > 0)
        .map(r => Number(r.resale_price) / (Number(r.floor_area_sqm) * 10.764));
      const avgPsf = psf.length > 0 ? psf.reduce((a, b) => a + b, 0) / psf.length : 0;

      // ── Build stats row ──
      const statsHtml = `
        <div class="stat-card"><div class="stat-val">${totalTxns}</div><div class="stat-label">Transactions</div></div>
        <div class="stat-card"><div class="stat-val" style="color:var(--accent);">${formatPrice(Math.round(avgPrice))}</div><div class="stat-label">Avg price</div></div>
        <div class="stat-card"><div class="stat-val">${formatPrice(maxPrice)}</div><div class="stat-label">Highest</div></div>
        <div class="stat-card"><div class="stat-val" style="font-size:16px;">${avgPsf > 0 ? '$' + Math.round(avgPsf) + ' psf' : '—'}</div><div class="stat-label">Avg price psf</div></div>
      `;

      // ── Build table ──
      const rowsHtml = records.slice(0, 200).map(r => `
        <tr>
          <td class="month-cell">${r.month}</td>
          <td>${r.block} ${r.street_name}</td>
          <td><span class="flat-badge">${r.flat_type}</span></td>
          <td>${r.storey_range}</td>
          <td>${r.floor_area_sqm} sqm</td>
          <td class="price-cell">${formatPrice(r.resale_price)}</td>
          <td style="color:var(--muted);font-size:12px;">${r.remaining_lease || '—'}</td>
        </tr>
      `).join('');

      const tableHtml = `
        <table>
          <thead>
            <tr>
              <th>Month</th>
              <th>Address</th>
              <th>Flat type</th>
              <th>Storey</th>
              <th>Size</th>
              <th>Resale price</th>
              <th>Remaining lease</th>
            </tr>
          </thead>
          <tbody>${rowsHtml}</tbody>
        </table>
        ${records.length > 200 ? `<div style="padding:12px 14px;font-size:12px;color:var(--muted);border-top:1px solid var(--border);">Showing first 200 of ${records.length} results. Refine your search to see fewer results.</div>` : ''}
      `;

      const town = document.getElementById('inp-town').value || 'All towns';
      const period = selectedMonths === 6 ? 'last 6 months' : selectedMonths === 12 ? 'last 1 year' : selectedMonths === 24 ? 'last 2 years' : 'last 5 years';

      clearState();
      document.getElementById('results-title').textContent = `${town} — ${period}`;
      document.getElementById('results-count').textContent = `${totalTxns} transaction${totalTxns !== 1 ? 's' : ''}`;
      document.getElementById('stats-row').innerHTML = statsHtml;
      document.getElementById('table-wrap').innerHTML = tableHtml;
      document.getElementById('results-section').style.display = 'block';
      document.getElementById('results-section').scrollIntoView({ behavior: 'smooth', block: 'start' });

    } catch (err) {
      showState(`
        <div class="state-box">
          <div class="state-icon">⚠️</div>
          <div class="state-title">Something went wrong</div>
          <div class="state-sub">${err.message}. Please try again in a moment.</div>
        </div>
      `);
    } finally {
      btn.disabled = false;
      btn.textContent = 'Search transactions';
    }
  }

  // Allow Enter key to search
  document.querySelectorAll('input').forEach(inp => {
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });
  });
</script>
</body>
</html>
